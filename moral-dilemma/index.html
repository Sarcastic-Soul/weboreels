<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Moral Compass</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>The Moral Compass</h1>
            <p>What do your choices say about your personality?</p>
        </header>
        
        <!-- Quiz Section -->
        <main id="quiz-container">
            <div id="progress-bar">Question <span id="current-q-num">1</span> of <span id="total-q-num">3</span></div>
            <div id="question-box">
                <h2 id="question-text">Loading dilemma...</h2>
                <div id="choices-box">
                    <!-- Buttons will be injected here by JavaScript -->
                </div>
            </div>
        </main>

        <!-- Results Section -->
        <div id="result-container" class="hidden">
            <h2>Your Ethical Personality</h2>
            <h3 id="result-title"></h3>
            <p id="result-desc"></p>
            <button id="restart-btn" class="btn primary-btn">Retake the Test</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
