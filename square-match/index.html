<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Match</title>

    <!-- Link to your stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- GSAP Library required for script.js animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>

    <!-- Link to your main script -->
    <script src="script.js" defer></script>
</head>

<body>
    <div class="ui">
        <div class="pill">Score: <strong id="score">0</strong></div>
        <div class="pill">Moves: <strong id="moves">30</strong></div>
        <button id="restart" class="pill btn">Restart</button>
    </div>

    <div class="board-wrap">
        <div id="board" class="board" aria-label="Tablero"></div>
    </div>

    <p id="dev">Developed with <span>❤</span> by <a href="https://codepen.io/designfenix/" target="_blank">Fernando
            Cohen</a></p>
</body>

</html>
